<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Downloader (standalone dev)</title>
    <script>
      (function () {
        var t = localStorage.getItem('sorai-theme') || 'dark'
        document.documentElement.setAttribute('data-theme', t)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Must be a real <script src>, not bundled -- see
         FileConverterApp/index.html's comment for why (neu's dev server
         only injects window.NL_PORT/NL_TOKEN/etc. into a genuine HTTP
         response for this exact path). -->
    <script src="/js/neutralino.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
